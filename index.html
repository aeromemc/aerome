(function () {
  function showModal(el) {
    // Bootstrap 3/4 (jQuery)
    if (window.jQuery && jQuery.fn && jQuery.fn.modal) {
      jQuery(el).modal('show');
      return true;
    }

    // Bootstrap 5 (no jQuery)
    if (window.bootstrap && bootstrap.Modal) {
      bootstrap.Modal.getOrCreateInstance(el).show();
      return true;
    }

    return false;
  }

  function tryOpenFromHash() {
    var hash = window.location.hash;
    if (!hash) return false;

    var el = document.querySelector(hash);
    if (!el) return false;

    // Must be a modal container
    if (!el.classList.contains('modal')) return false;

    return showModal(el);
  }

  function openWithRetry(maxMs) {
    var start = Date.now();

    function tick() {
      if (tryOpenFromHash()) return;

      if (Date.now() - start < maxMs) {
        setTimeout(tick, 100);
      }
    }

    tick();
  }

  // On initial load (with retries for AJAX/PJAX rendered content)
  document.addEventListener('DOMContentLoaded', function () {
    openWithRetry(4000);
  });

  // If hash changes while on page
  window.addEventListener('hashchange', function () {
    openWithRetry(2000);
  });
})();
